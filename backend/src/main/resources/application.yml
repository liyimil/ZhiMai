spring:
  application:
    name: zhimai
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/zhiguang?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1700000
      keepalive-time: 300000
      connection-timeout: 30000
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      default-topic: counter-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      linger: 10ms
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: counter-agg
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    listener:
      type: single
      ack-mode: manual
  ai:
    deepseek:
      api-key: ${MIMO_API_KEY:replace-me}
      base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1}
      chat:
        options:
          model: ${MIMO_CHAT_MODEL:mimo-v2.5-pro}
          temperature: 0.2
    openai:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${DASHSCOPE_API_KEY:replace-me}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v4}
          dimensions: 1536
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: ${RAG_INDEX_NAME:zhimai-ai-index}
        dimensions: 1536
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

rag:
  content-base-url: ${RAG_CONTENT_BASE_URL:http://localhost:5173}

canal:
  enabled: ${CANAL_ENABLED:false}
  host: ${CANAL_HOST:localhost}
  port: ${CANAL_PORT:11111}
  destination: ${CANAL_DESTINATION:example}
  username: ${CANAL_USERNAME:canal}
  password: ${CANAL_PASSWORD:}
  filter: zhiguang\.outbox
  batchSize: 1000
  intervalMs: 1000

counter:
  rebuild:
    enabled: false
    lock:
      ttl-ms: 5000
      watchdog-ms: 30000
    rate:
      permits: 3
      window-seconds: 10
    backoff:
      base-ms: 500
      max-ms: 30000

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

auth:
  jwt:
    issuer: zhimai
    key-id: zhimai-key
    private-key: ${JWT_PRIVATE_KEY:classpath:keys/private.pem}
    public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6
    ttl: PT5M
    max-attempts: 5
    send-interval: PT60S
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8

logging:
  level:
    root: INFO
    '[com.tongji]': INFO

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:replace-me}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:replace-me}
  bucket: ${OSS_BUCKET:replace-me}
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: avatars

cache:
  l2:
    public-cfg:
      ttl-seconds: 15
      max-size: 1000
    mine-cfg:
      ttl-seconds: 10
      max-size: 1000
  hotkey:
    window-seconds: 60
    segment-seconds: 10
    level-low: 50
    level-medium: 200
    level-high: 500
    extend-low-seconds: 20
    extend-medium-seconds: 60
    extend-high-seconds: 120

